<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Bregas Drama Band | Links Oficiais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <!-- CABEÇALHO (Logo oficial da banda) -->
        <header class="header-section">
            <img src="LOGO D BREGAS OFICIAL FINAL 1.png" alt="D'Bregas Drama Band Logo" class="profile-avatar">
            <h1>D'Bregas Drama Band</h1>
            <p class="tagline">O espetáculo do brega, drama e paixão! 💔🍹🎤</p>
        </header>

        <!-- FOTO DA BANDA SEM FUNDO -->
        <section class="band-photo-container">
            <img src="foto-banda.png" alt="D'Bregas Drama Band Integrantes" class="band-photo">
        </section>

        <!-- AGENDA DE SHOWS (Carregada dinamicamente pelo arquivo agenda.json) -->
        <section class="agenda-container">
            <h2>📅 AGENDA DE SHOWS</h2>
            <div id="agenda-shows">
                <!-- Os shows vão aparecer aqui de forma dinâmica -->
            </div>
        </section>

        <!-- BOTÕES DE LINK (Estilo Linktree) -->
        <main class="links-container">
            
            <!-- Botão do Vídeo que abre em Modal (Popup) -->
            <button id="open-video-btn" class="link-btn video-destaque">
                <span>🎥 ASSISTIR VÍDEO DE APRESENTAÇÃO</span>
            </button>

            <a href="https://wa.me/SEUNUMERO" target="_blank" class="link-btn destaque">
                <span>📅 CONTRATE NOSSO SHOW (WhatsApp)</span>
            </a>

            <a href="https://www.instagram.com/dbregasdramaband/" target="_blank" class="link-btn">
                <span>📸 Acompanhe no Instagram</span>
            </a>

            <a href="https://www.youtube.com/@dbregasdramaband" target="_blank" class="link-btn">
                <span>🔺 Nosso Canal no YouTube</span>
            </a>

            <a href="https://open.spotify.com/" target="_blank" class="link-btn">
                <span>🎵 Ouça no Spotify</span>
            </a>

            <a href="mailto:contato@email.com" class="link-btn">
                <span>✉️ Email para Imprensa & Parcerias</span>
            </a>

        </main>

        <!-- RODAPÉ -->
        <footer class="footer-section">
            <p>© 2026 D'Bregas Drama Band. Todos os direitos reservados.</p>
        </footer>
    </div>

    <!-- ESTRUTURA DO POPUP / MODAL -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">×</span>
            <div class="video-wrapper">
                <iframe id="video-iframe" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
